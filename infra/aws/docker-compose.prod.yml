name: docvault-prod

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    # Queue only — do not publish 6379 to the host/Internet.
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/aws/Dockerfile.api
    restart: unless-stopped
    env_file:
      - ${DOCVAULT_ENV_FILE:-../../.env}
    expose:
      - "3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: ../..
      dockerfile: infra/aws/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ${DOCVAULT_ENV_FILE:-../../.env}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: infra/aws/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.docvault.vn}
    restart: unless-stopped
    env_file:
      - ${DOCVAULT_ENV_FILE:-../../.env}
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Let's Encrypt certs issued on the EC2 host (certbot).
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web
      - api

volumes:
  redis_data:
