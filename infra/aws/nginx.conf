# TLS terminated on EC2 (Let's Encrypt). DNS A records at registrar (e.g. Mắt Bão)
# point app/api hostnames at the instance Elastic IP — no ALB/ACM required.

upstream docvault_web {
  server web:3000;
}

upstream docvault_api {
  server api:3001;
}

# HTTP → HTTPS. Cert renew uses certbot --standalone (stop nginx briefly).
server {
  listen 80;
  server_name app.docvault.vn api.docvault.vn;

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name app.docvault.vn;

  ssl_certificate     /etc/letsencrypt/live/app.docvault.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.docvault.vn/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 30m;

  location / {
    proxy_pass http://docvault_web;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}

server {
  listen 443 ssl;
  http2 on;
  server_name api.docvault.vn;

  ssl_certificate     /etc/letsencrypt/live/app.docvault.vn/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.docvault.vn/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 2m;

  location / {
    proxy_pass http://docvault_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }
}
